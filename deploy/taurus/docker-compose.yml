services:
  image-this-mcp:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: image-this-mcp
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FASTMCP_PORT:-39010}:${FASTMCP_PORT:-39010}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - image_this_output:/data/output

volumes:
  image_this_output:
